<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="benawanghub">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>benawanghub</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Sign-In Client ID -->
  <!-- You must replace YOUR_CLIENT_ID with your actual Web Client ID from Firebase Console -->
  <meta name="google-signin-client_id"
    content="542370963010-emi5s1jkpdnmduduo8qb12hgqmo9fi44.apps.googleusercontent.com">

  <!-- OneSignal Integration -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      console.log("OneSignal: Initializing...");
      await OneSignal.init({
        appId: "ebfffbc8-21f0-4f90-bb39-53f62672b18d",
        safari_web_id: "web.onesignal.auto.1762c474-0f9c-4d7a-8b1b-6899cf4a42b1",
        notifyButton: {
          enable: true,
        },
        allowLocalhostAsHTTP: true,
        promptOptions: {
          slidedown: {
            enabled: true,
            autoPrompt: true,
            timeDelay: 5,
            pageViews: 1
          }
        }
      });
      console.log("OneSignal: Initialized!");
      
      setTimeout(() => {
        OneSignal.Notifications.requestPermission();
      }, 5000);
    });
  </script>
</head>

<body>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null, // Force no-cache for debug/deployment stability
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            renderer: "html" // <--- FORCE HTML RENDERER HERE
          }).then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
  <script src="flutter.js" defer></script>
</body>

</html>
